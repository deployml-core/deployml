name: gcp-mlops-stack-mlflow
provider:
  name: gcp
  project_id: deployml-489218
  region: us-west1
deployment:
  type: cloud_run
stack:
  - experiment_tracking:
      name: mlflow
      params:
        service_name: mlflow-server
  - artifact_tracking:
      name: mlflow
      params:
        artifact_bucket: mlflow-artifacts-deployml-489218
  - model_registry:
      name: mlflow
      params:
        backend_store_uri: postgresql
  # - feature_store:
  #     name: feast
  #     params:
  #       service_name: feast-server
  #       backend_store_uri: postgresql
  #       offline_store: bigquery
  #       bigquery_dataset: deployml-489218.feast_housing.house_data
  - model_serving:
      name: fastapi
      params:
        service_name: fastapi-mlflow-server
  - model_monitoring:
      name: grafana
      params:
        service_name: grafana-server
